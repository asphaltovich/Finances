{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — МойУчётФинансов</title>
    <link rel="stylesheet" href="{% static 'styles1.css' %}">
</head>
<body>
    <div class="page-wrapper">
        <header class="header-center">
            <h1>Регистрация</h1>
        </header>
        <form method="post" class="registration-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="fullname">ФИО</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@yandex.ru" required>
            </div>
            <div class="form-group">
                <label for="birthdate">Дата рождения</label>
                <input type="text" id="birthdate" name="birthdate" placeholder="дд.мм.гггг" pattern="\d{2}\.\d{2}\.\d{4}" required>
            </div>
            <div class="form-group">
                <label for="username">Придумайте логин</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Придумайте пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="button-container">
                <button type="submit" class="submit-btn">Далее</button>
            </div>
        </form>
    </div>
</body>
</html>
