{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить цель</title>
    <link rel="stylesheet" href="{% static 'styles10.css' %}">
</head>
<body>
    <div class="header-container">
        <div class="header-title">МойУчётФинансов</div>
        <div class="header-icon"></div>
    </div>
    <form method="POST" action="{% url 'add_goal' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Название цели</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Описание цели</label>
            <textarea name="description"></textarea>
        </div>
        <div class="bottom-row">
            <div class="form-group" style="margin-bottom: 0;">
                <label>Сумма в рублях</label>
                <input type="number" step="0.01" name="amount" required>
            </div>
            <button type="submit" class="submit-btn">Далее</button>
        </div>
    </form>
</body>
</html>
