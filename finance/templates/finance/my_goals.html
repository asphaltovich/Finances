{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МойУчётФинансов - Цели</title>
    <link rel="stylesheet" href="{% static 'styles6.css' %}">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header-section">
            <div class="title-box">МойУчётФинансов</div>
            <div class="square-box"></div>
        </div>

        <!-- Таблица с целями -->
        <div class="grid-section">
            <!-- КОЛОНКА 1: Название -->
            <div class="grid-column">
                <div class="column-header">Название цели</div>
                <div class="column-content">
                    {% for goal in user_goals %}
                        <div class="list-item">{{ goal.name }}</div>
                    {% endfor %}
                </div>
            </div>

            <!-- КОЛОНКА 2: Описание -->
            <div class="grid-column">
                <div class="column-header">Описание цели</div>
                <div class="column-content">
                    {% for goal in user_goals %}
                        <div class="list-item">{{ goal.description|default:"-" }}</div>
                    {% endfor %}
                </div>
            </div>

            <!-- КОЛОНКА 3: Сумма -->
            <div class="grid-column">
                <div class="column-header">Сумма</div>
                <div class="column-content">
                    {% for goal in user_goals %}
                        <div class="list-item">{{ goal.amount }} ₽</div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- Кнопка -->
        <div class="footer-section">
            <a href="{% url 'main' %}" class="main-btn" style="text-decoration: none; color: inherit;">На главную</a>
        </div>
    </div>
</body>
</html>
